spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: usuario-service
          uri: lb://usuario-service
          predicates:
            - Path=/usuarios/**
        - id: produto-service
          uri: lb://produto-service
          predicates:
            - Path=/produtos/**

        - id: pedido-service
          uri: lb://pedido-service
          predicates:
            - Path=/pedidos/**
server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/